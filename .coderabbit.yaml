# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# CodeRabbit Configuration — claude-devteam
# Durable AI Development Team Orchestrator
#
# In PR, comment "@coderabbitai configuration" to dump the active config

# =============================================================================
# GLOBAL SETTINGS
# =============================================================================

language: "en-US"

tone_instructions: >
  Focus on Python correctness, type safety, Pydantic model consistency,
  DBOS workflow durability patterns, and state machine invariants.
  Flag missing error handling in side-effecting operations.

early_access: false
enable_free_tier: true

# =============================================================================
# REVIEWS
# =============================================================================

reviews:
  profile: "assertive"
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_instructions: ""
  high_level_summary_placeholder: "@coderabbitai summary"
  high_level_summary_in_walkthrough: false

  auto_title_placeholder: "@coderabbitai"
  auto_title_instructions: >
    Use conventional commit format: <type>: <description>.
    Types: feat, fix, docs, chore, refactor, test, style, perf, ci.
    Keep under 70 characters. Lowercase after the colon.

  review_status: true
  review_details: false
  commit_status: true
  fail_commit_status: false
  collapse_walkthrough: false
  changed_files_summary: true
  sequence_diagrams: true
  estimate_code_review_effort: true
  poem: false
  in_progress_fortune: true
  enable_prompt_for_ai_agents: true
  disable_cache: false

  assess_linked_issues: true
  related_issues: true
  related_prs: true

  suggested_labels: true
  labeling_instructions: []
  auto_apply_labels: false

  suggested_reviewers: true
  auto_assign_reviewers: false

  abort_on_close: true

  # ---------------------------------------------------------------------------
  # PATH FILTERS
  # ---------------------------------------------------------------------------
  path_filters:
    - "!.pixi/**"

  # ---------------------------------------------------------------------------
  # PATH INSTRUCTIONS
  # All instructions fields MUST stay under 250 characters.
  # ---------------------------------------------------------------------------
  path_instructions:
    - path: "src/devteam/models/**"
      instructions: >
        Entity models with enum-based state machines. Verify state transitions are validated — no invalid jumps. Check Pydantic
        model_validator usage. Ensure JobStatus/TaskStatus/PRStatus enums are the single source of truth (never redefined elsewhere).

    - path: "src/devteam/daemon/**"
      instructions: >
        FastAPI daemon with singleton PID locking. Verify graceful shutdown and that control files are cleaned up on stop. Check that
        cleanup never removes files belonging to a different process. Validate all endpoints return proper error codes.

    - path: "src/devteam/cli/**"
      instructions: >
        Typer CLI commands. Verify no raw tracebacks reach the user — all exceptions must produce friendly messages. Check that
        unimplemented features fail gracefully. Validate that commands match their documented help text.

    - path: "src/devteam/orchestrator/**"
      instructions: >
        Workflow engine. Verify review chain order is enforced structurally (peer before EM). Check revision loops are bounded.
        Validate invoker errors are wrapped with context. Ensure escalation paths are reachable.

    - path: "src/devteam/agents/**"
      instructions: >
        Agent registry, invoker, and contracts. Verify unknown roles are rejected (fail closed, not fail open). Check that contract
        cross-field validators enforce all invariants. Validate agent prompts are actually passed to the SDK.

    - path: "src/devteam/templates/**"
      instructions: >
        Agent definition .md templates with YAML frontmatter. Verify model tiers (opus/sonnet/haiku) match the design spec. Check
        tool access is appropriate per role. Validate prompt bodies define identity, expertise, and completion protocol.

    - path: "src/devteam/knowledge/**"
      instructions: >
        SurrealDB knowledge store with vector embeddings and graph relationships. Verify scope filtering (process=shared,
        code=project-scoped). Check graceful degradation when SurrealDB is unavailable. Validate secret scanning on ingest.

    - path: "src/devteam/git/**"
      instructions: >
        Git lifecycle. Every operation must be idempotent on retry. Errors from external CLIs (git, gh) must not be silently
        swallowed — distinguish "not found" from real failures. Verify fork workflows don't assume single-owner repos.

    - path: "src/devteam/config/**"
      instructions: >
        Configuration from TOML files with global/project merge. Verify push_to_main is always forced to "never" regardless of config.
        Check that explicitly set project values override global defaults even when the value matches the default.

    - path: "tests/**"
      instructions: >
        Tests use pytest + pytest-asyncio. Verify tests don't depend on external services (SurrealDB uses mem://, git uses tmp repos,
        HTTP uses httpx AsyncClient, SDK uses mocks). Check that validators are tested for both valid and invalid inputs.

    - path: ".github/workflows/**"
      instructions: >
        CI runs on every PR: ruff (lint + format), pyright (type check), pytest. Verify pixi environment setup and version match
        local lockfile. Check timeout values are reasonable.

  # ---------------------------------------------------------------------------
  # AUTO REVIEW
  # ---------------------------------------------------------------------------
  auto_review:
    enabled: true
    auto_incremental_review: true
    auto_pause_after_reviewed_commits: 10
    drafts: false
    ignore_title_keywords:
      - "WIP"
      - "do not review"
      - "skip review"
    description_keyword: ""
    labels: []
    base_branches: []
    ignore_usernames:
      - "dependabot[bot]"
      - "renovate[bot]"
      - "github-actions[bot]"

  # ---------------------------------------------------------------------------
  # PRE-MERGE CHECKS
  # ---------------------------------------------------------------------------
  pre_merge_checks:
    override_requested_reviewers_only: false
    title:
      mode: "warning"
      requirements: "Must use conventional commit format (feat:, fix:, docs:, chore:, refactor:, test:, style:, perf:, ci:)"
    description:
      mode: "warning"
    issue_assessment:
      mode: "off"
    docstrings:
      mode: "off"
      threshold: 80
    custom_checks:
      - name: "State Machine Invariants"
        mode: "warning"
        instructions: >
          If models/entities.py or models/state.py changed, verify all state transitions are tested for both valid and invalid paths.
          Check that no code bypasses the validated transition methods to set status directly.
      - name: "Side Effect Isolation"
        mode: "warning"
        instructions: >
          If orchestrator/ changed, verify external side effects (agent calls, git ops) are isolated in separate functions that can
          be individually retried or mocked. Check that workflow functions do not mix business logic with side effects.
      - name: "Idempotent Side Effects"
        mode: "warning"
        instructions: >
          If git/ changed, verify every side-effecting function follows the check-before-act pattern: check if the effect already
          happened before performing it. This is required for safe crash recovery and retry.
      - name: "Contract Validation"
        mode: "warning"
        instructions: >
          If agents/contracts.py changed, verify cross-field validators enforce all invariants: question required when blocked,
          comments required for revision verdicts, DAG cycle detection, no duplicate task IDs, no dangling dependencies.

  # ---------------------------------------------------------------------------
  # FINISHING TOUCHES
  # ---------------------------------------------------------------------------
  finishing_touches:
    docstrings:
      enabled: false
    unit_tests:
      enabled: false
    custom: []

  # ---------------------------------------------------------------------------
  # TOOLS
  # ---------------------------------------------------------------------------
  tools:
    # Relevant — Python project
    ruff:
      enabled: true
    pylint:
      enabled: false
    semgrep:
      enabled: true
    gitleaks:
      enabled: true
    trufflehog:
      enabled: true
    markdownlint:
      enabled: true
    languagetool:
      enabled: true
    github-checks:
      enabled: true
    dotenvLint:
      enabled: true
    osvScanner:
      enabled: true
    yamllint:
      enabled: true
    actionlint:
      enabled: true

    # Not relevant
    eslint:
      enabled: false
    biome:
      enabled: false
    flake8:
      enabled: false
    shellcheck:
      enabled: false
    hadolint:
      enabled: false
    checkov:
      enabled: false
    trivy:
      enabled: false
    oxc:
      enabled: false
    phpstan:
      enabled: false
    phpmd:
      enabled: false
    phpcs:
      enabled: false
    swiftlint:
      enabled: false
    detekt:
      enabled: false
    rubocop:
      enabled: false
    clippy:
      enabled: false
    fortitudeLint:
      enabled: false
    buf:
      enabled: false
    regal:
      enabled: false
    pmd:
      enabled: false
    clang:
      enabled: false
    cppcheck:
      enabled: false
    opengrep:
      enabled: false
    shopifyThemeCheck:
      enabled: false
    luacheck:
      enabled: false
    brakeman:
      enabled: false
    psscriptanalyzer:
      enabled: false
    blinter:
      enabled: false
    checkmake:
      enabled: false
    htmlhint:
      enabled: false
    stylelint:
      enabled: false
    sqlfluff:
      enabled: false
    prismaLint:
      enabled: false
    tflint:
      enabled: false
    circleci:
      enabled: false
    smartyLint:
      enabled: false
    emberTemplateLint:
      enabled: false
    golangci-lint:
      enabled: false

# =============================================================================
# CHAT
# =============================================================================

chat:
  art: false
  auto_reply: true
  integrations:
    jira:
      usage: "disabled"
    linear:
      usage: "disabled"

# =============================================================================
# KNOWLEDGE BASE
# =============================================================================

knowledge_base:
  opt_out: false
  web_search:
    enabled: true
  code_guidelines:
    enabled: true
    filePatterns:
      - "**/CLAUDE.md"
      - "**/AGENTS.md"
  learnings:
    scope: "global"
  issues:
    scope: "auto"
  pull_requests:
    scope: "auto"
  jira:
    usage: "disabled"
    project_keys: []
  linear:
    usage: "disabled"
    team_keys: []
  mcp:
    usage: "auto"
    disabled_servers: []
  linked_repositories: []

# =============================================================================
# ISSUE ENRICHMENT
# =============================================================================

issue_enrichment:
  auto_enrich:
    enabled: false
  planning:
    enabled: false
    auto_planning:
      enabled: false
      labels: []
  labeling:
    labeling_instructions: []
    auto_apply_labels: false

# =============================================================================
# CODE GENERATION
# =============================================================================

code_generation:
  docstrings:
    language: "en-US"
    path_instructions: []
  unit_tests:
    path_instructions: []
