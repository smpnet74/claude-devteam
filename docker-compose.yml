services:
  surrealdb:
    image: surrealdb/surrealdb:v3.0.4
    container_name: devteam-surrealdb
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - surrealdb-data:/data
    environment:
      - SURREAL_USER=${SURREAL_USER:-root}
      - SURREAL_PASS=${SURREAL_PASS:-root}
    command: start --user $${SURREAL_USER} --pass $${SURREAL_PASS} surrealkv:/data/devteam.db
    restart: unless-stopped

  surrealist:
    image: surrealdb/surrealist:v3.1.1
    container_name: devteam-surrealist
    ports:
      - "127.0.0.1:8001:8080"
    restart: unless-stopped

volumes:
  surrealdb-data:
